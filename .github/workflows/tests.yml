name: tests

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        php: [ '8.2', '8.3', '8.4', '8.5' ]
        laravel: [ '11.46', '11.51', '12.50', '12.56', '13.0', '13.5' ]
        enum: ['2', '3', '4']
        exclude:
          - php: '8.2'
            laravel: '13.0'
          - php: '8.2'
            laravel: '13.5'
    name: PHP ${{ matrix.php }} Laravel ${{ matrix.laravel }} Enum ${{ matrix.enum }}
    steps:
      - name: Checkout
        uses: actions/checkout@master
      - name: Installing PHP
        uses: shivammathur/setup-php@master
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json, sqlite3
          tools: composer:v2
      - name: Lock Laravel Version
        run: |
          composer require "konekt/enum:${{ matrix.enum }}.*" --no-update -v     
          composer require "laravel/framework:${{ matrix.laravel }}.*" --no-update -v
      - name: Composer Install
        run: composer install --prefer-dist --no-progress --no-interaction
      - name: Create Database
        run: mkdir -p database && touch database/database.sqlite
      - name: Run Tests
        run: php vendor/bin/phpunit --testdox
